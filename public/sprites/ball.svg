<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="32" height="32" shape-rendering="crispEdges">
  <rect x="4" y="0" width="8" height="2" fill="#FFFFFF"/>
  <rect x="2" y="2" width="12" height="2" fill="#FFFFFF"/>
  <rect x="0" y="4" width="16" height="8" fill="#FFFFFF"/>
  <rect x="2" y="12" width="12" height="2" fill="#FFFFFF"/>
  <rect x="4" y="14" width="8" height="2" fill="#FFFFFF"/>
  <!-- Black hexagon pattern -->
  <rect x="6" y="4" width="4" height="2" fill="#000000"/>
  <rect x="4" y="6" width="2" height="2" fill="#000000"/>
  <rect x="10" y="6" width="2" height="2" fill="#000000"/>
  <rect x="6" y="8" width="4" height="2" fill="#000000"/>
  <rect x="2" y="6" width="2" height="2" fill="#000000"/>
  <rect x="12" y="6" width="2" height="2" fill="#000000"/>
  <!-- Outline -->
  <rect x="4" y="0" width="2" height="2" fill="#000000" opacity="0.3"/>
  <rect x="10" y="0" width="2" height="2" fill="#000000" opacity="0.3"/>
  <rect x="0" y="6" width="2" height="2" fill="#000000" opacity="0.3"/>
  <rect x="14" y="6" width="2" height="2" fill="#000000" opacity="0.3"/>
</svg>
