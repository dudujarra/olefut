<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Elifoot Squad Management SNES</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts for Retro Pixel Look -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'elifoot-gray-dark': '#1a1a1a',
            'elifoot-gray-panel': '#c0c0c0',
            'elifoot-field-green': '#3d6141',
            'elifoot-border-light': '#ffffff',
            'elifoot-border-dark': '#555555',
            'elifoot-gold': '#ffff00',
          },
          fontFamily: {
            'pixel': ['"Press Start 2P"', 'cursive'],
          }
        }
      }
    }
  </script>
<style data-purpose="retro-borders">
    /* Custom Bevel Effect - Classic 16-bit UI Look */
    .bevel-outset {
      border-top: 4px solid #ffffff;
      border-left: 4px solid #ffffff;
      border-bottom: 4px solid #555555;
      border-right: 4px solid #555555;
      background-color: #c0c0c0;
    }
    .bevel-inset {
      border-top: 4px solid #555555;
      border-left: 4px solid #555555;
      border-bottom: 4px solid #ffffff;
      border-right: 4px solid #ffffff;
      background-color: #3d6141;
    }
    .bevel-button {
      border-top: 3px solid #ffffff;
      border-left: 3px solid #ffffff;
      border-bottom: 3px solid #000000;
      border-right: 3px solid #000000;
      box-shadow: inset 1px 1px 0px #eee;
      transition: all 0.1s;
    }
    .bevel-button:active {
      border-top: 3px solid #000000;
      border-left: 3px solid #000000;
      border-bottom: 3px solid #ffffff;
      border-right: 3px solid #ffffff;
      transform: translate(1px, 1px);
    }
    .active-filter {
      background-color: #ff0000 !important;
      color: white !important;
    }
    .pixel-marker-home {
      width: 10px;
      height: 10px;
      background-color: #ff0000;
      border: 1px solid #000;
      box-shadow: 2px 2px 0px rgba(0,0,0,0.5);
    }
    /* Hide scrollbar for retro feel */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #1a1a1a; }
    ::-webkit-scrollbar-thumb { background: #c0c0c0; border: 2px solid #555; }
  </style>
<style data-purpose="typography">
    body {
      font-family: 'Press Start 2P', cursive;
      background-color: #1a1a1a;
      color: #000;
      image-rendering: pixelated;
    }
    .text-xs-pixel { font-size: 8px; }
    .text-sm-pixel { font-size: 10px; }
    .text-base-pixel { font-size: 12px; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
<!-- BEGIN: Main Game Container -->
<main class="w-[1024px] aspect-[4/3] bg-elifoot-gray-dark border-8 border-elifoot-gray-panel p-4 flex flex-col gap-4 shadow-2xl overflow-hidden" data-purpose="squad-management-screen">
<!-- BEGIN: Header -->
<header class="bevel-outset p-4 flex justify-between items-center text-base-pixel h-16">
<div>SQUAD MANAGEMENT</div>
<div class="text-elifoot-gold">BUDGET: $5,000,000</div>
<div>TEAM: <span class="text-red-600">HOME</span></div>
</header>
<!-- END: Header -->
<!-- BEGIN: Position Filters -->
<nav class="flex gap-4" data-purpose="position-filters">
<button class="bevel-button active-filter px-6 py-2 text-sm-pixel bg-elifoot-gray-panel">ALL</button>
<button class="bevel-button px-6 py-2 text-sm-pixel bg-elifoot-gray-panel">GK</button>
<button class="bevel-button px-6 py-2 text-sm-pixel bg-elifoot-gray-panel">DEF</button>
<button class="bevel-button px-6 py-2 text-sm-pixel bg-elifoot-gray-panel">MID</button>
<button class="bevel-button px-6 py-2 text-sm-pixel bg-elifoot-gray-panel">ATT</button>
</nav>
<!-- END: Position Filters -->
<!-- BEGIN: Main Dashboard Area -->
<div class="flex-1 flex gap-4 overflow-hidden" data-purpose="squad-layout">
<!-- BEGIN: Left Side - Mini Campo -->
<section class="w-1/3 bevel-outset p-2 flex flex-col gap-2">
<div class="text-center text-xs-pixel mb-1">FORMATION: 4-3-3</div>
<div class="flex-1 bevel-inset relative overflow-hidden flex flex-col justify-around py-4">
<!-- Pitch Markings -->
<div class="absolute top-1/2 left-0 w-full h-[2px] bg-white opacity-40"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-24 h-24 border-2 border-white opacity-40 rounded-full"></div>
<!-- Players Placement (4-3-3 vertical layout) -->
<!-- ATT -->
<div class="flex justify-around px-4">
<div class="pixel-marker-home"></div>
<div class="pixel-marker-home"></div>
<div class="pixel-marker-home"></div>
</div>
<!-- MID -->
<div class="flex justify-around px-8">
<div class="pixel-marker-home"></div>
<div class="pixel-marker-home"></div>
<div class="pixel-marker-home"></div>
</div>
<!-- DEF -->
<div class="flex justify-around px-4">
<div class="pixel-marker-home"></div>
<div class="pixel-marker-home"></div>
<div class="pixel-marker-home"></div>
<div class="pixel-marker-home"></div>
</div>
<!-- GK -->
<div class="flex justify-center">
<div class="pixel-marker-home"></div>
</div>
</div>
</section>
<!-- END: Left Side - Mini Campo -->
<!-- BEGIN: Right Side - Player Table -->
<section class="w-2/3 bevel-outset flex flex-col overflow-hidden">
<div class="p-2 border-b-4 border-elifoot-border-dark bg-elifoot-gray-dark text-white text-xs-pixel flex">
<span class="w-12">POS</span>
<span class="flex-1">NAME</span>
<span class="w-16 text-center">SKL</span>
<span class="w-12 text-center">AGE</span>
<span class="w-16 text-center">COND</span>
</div>
<!-- Table Body -->
<div class="flex-1 overflow-y-auto" data-purpose="player-list">
<!-- Sample Rows (Total 22 requested) -->
<div class="p-2 border-b border-elifoot-border-dark flex text-xs-pixel items-center hover:bg-elifoot-field-green hover:text-white cursor-pointer transition-colors">
<span class="w-12 text-blue-700">GK</span>
<span class="flex-1">PETER SCHMEICHEL</span>
<span class="w-16 text-center">92</span>
<span class="w-12 text-center">32</span>
<span class="w-16 text-center text-green-700 font-bold">100</span>
</div>
<div class="p-2 border-b border-elifoot-border-dark flex text-xs-pixel items-center hover:bg-elifoot-field-green hover:text-white cursor-pointer transition-colors bg-gray-200">
<span class="w-12 text-yellow-700">DEF</span>
<span class="flex-1">FRANCO BARESI</span>
<span class="w-16 text-center">90</span>
<span class="w-12 text-center">35</span>
<span class="w-16 text-center text-green-700 font-bold">98</span>
</div>
<div class="p-2 border-b border-elifoot-border-dark flex text-xs-pixel items-center hover:bg-elifoot-field-green hover:text-white cursor-pointer transition-colors">
<span class="w-12 text-yellow-700">DEF</span>
<span class="flex-1">PAOLO MALDINI</span>
<span class="w-16 text-center">91</span>
<span class="w-12 text-center">27</span>
<span class="w-16 text-center text-green-700 font-bold">100</span>
</div>
<div class="p-2 border-b border-elifoot-border-dark flex text-xs-pixel items-center hover:bg-elifoot-field-green hover:text-white cursor-pointer transition-colors bg-gray-200">
<span class="w-12 text-green-700">MID</span>
<span class="flex-1">ZINEDINE ZIDANE</span>
<span class="w-16 text-center">94</span>
<span class="w-12 text-center">23</span>
<span class="w-16 text-center text-green-700 font-bold">100</span>
</div>
<div class="p-2 border-b border-elifoot-border-dark flex text-xs-pixel items-center hover:bg-elifoot-field-green hover:text-white cursor-pointer transition-colors">
<span class="w-12 text-red-700">ATT</span>
<span class="flex-1">ROMARIO</span>
<span class="w-16 text-center">95</span>
<span class="w-12 text-center">29</span>
<span class="w-16 text-center text-yellow-600 font-bold">85</span>
</div>
<div class="p-2 border-b border-elifoot-border-dark flex text-xs-pixel items-center hover:bg-elifoot-field-green hover:text-white cursor-pointer transition-colors bg-gray-200">
<span class="w-12 text-red-700">ATT</span>
<span class="flex-1">RONALDO</span>
<span class="w-16 text-center">96</span>
<span class="w-12 text-center">19</span>
<span class="w-16 text-center text-green-700 font-bold">92</span>
</div>
<!-- Filling up more rows for 22 count logic -->
<script data-purpose="populate-players">
            // This is just to fill the 22 rows dynamically as per request aesthetic
            const container = document.querySelector('[data-purpose="player-list"]');
            const players = [
              { pos: 'GK', name: 'SUB GK', skl: '75', age: '22', cond: '100' },
              { pos: 'DEF', name: 'ROBERTO CARLOS', skl: '88', age: '22', cond: '100' },
              { pos: 'DEF', name: 'CAFU', skl: '87', age: '25', cond: '95' },
              { pos: 'MID', name: 'DUNGA', skl: '85', age: '31', cond: '100' },
              { pos: 'MID', name: 'RAI', skl: '84', age: '30', cond: '100' },
              { pos: 'ATT', name: 'BEBETO', skl: '89', age: '31', cond: '100' },
              { pos: 'DEF', name: 'ALDAIR', skl: '86', age: '29', cond: '90' },
              { pos: 'MID', name: 'MAURO SILVA', skl: '85', age: '27', cond: '100' },
              { pos: 'ATT', name: 'MULLER', skl: '82', age: '29', cond: '100' },
              { pos: 'GK', name: 'RESERVE GK', skl: '70', age: '20', cond: '100' },
              { pos: 'DEF', name: 'ZAGO', skl: '80', age: '26', cond: '100' },
              { pos: 'MID', name: 'LEONARDO', skl: '85', age: '26', cond: '100' },
              { pos: 'MID', name: 'ZINHO', skl: '82', age: '28', cond: '100' },
              { pos: 'ATT', name: 'EDMUNDO', skl: '86', age: '24', cond: '80' },
              { pos: 'DEF', name: 'MARCIO SANTOS', skl: '81', age: '26', cond: '100' },
              { pos: 'MID', name: 'MAZINHO', skl: '80', age: '29', cond: '100' }
            ];

            players.forEach((p, index) => {
              const row = document.createElement('div');
              row.className = `p-2 border-b border-elifoot-border-dark flex text-xs-pixel items-center hover:bg-elifoot-field-green hover:text-white cursor-pointer transition-colors ${index % 2 === 0 ? 'bg-gray-200' : ''}`;
              
              let posColor = 'text-blue-700';
              if(p.pos === 'DEF') posColor = 'text-yellow-700';
              if(p.pos === 'MID') posColor = 'text-green-700';
              if(p.pos === 'ATT') posColor = 'text-red-700';

              row.innerHTML = `
                <span class="w-12 ${posColor}">${p.pos}</span>
                <span class="flex-1">${p.name}</span>
                <span class="w-16 text-center">${p.skl}</span>
                <span class="w-12 text-center">${p.age}</span>
                <span class="w-16 text-center text-green-700 font-bold">${p.cond}</span>
              `;
              container.appendChild(row);
            });
          </script>
</div>
</section>
<!-- END: Right Side - Player Table -->
</div>
<!-- END: Main Dashboard Area -->
<!-- BEGIN: Bottom Interaction Bar -->
<footer class="h-16 flex gap-4" data-purpose="action-buttons">
<button class="bevel-button flex-1 bg-elifoot-gray-panel text-sm-pixel font-bold">SAVE LINEUP</button>
<button class="bevel-button flex-1 bg-elifoot-gray-panel text-sm-pixel font-bold">TRANSFER LIST</button>
<button class="bevel-button w-48 bg-red-600 text-white text-sm-pixel font-bold">EXIT</button>
</footer>
<!-- END: Bottom Interaction Bar -->
</main>
<!-- END: Main Game Container -->
</body></html>
