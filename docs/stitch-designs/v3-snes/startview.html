<!DOCTYPE html>

<html lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Elifoot SNES - Title Screen</title>
<!-- Tailwind CSS CDN with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Pixel Art Style -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap" rel="stylesheet"/>
<style data-purpose="custom-fonts">
    body {
      font-family: 'Press Start 2P', cursive;
      image-rendering: pixelated;
      background-color: #000;
    }
  </style>
<style data-purpose="layout-and-colors">:root {
    --snes-green: #2D5A3D;
    --snes-dark-green: #1a3322;
    --snes-yellow: #FEDE00;
    --snes-red: #d93d3d;
    --snes-blue: #3d59d9;
    --snes-gray: #a3a3a3;
    --snes-light-gray: #ccc;
    --snes-dark-gray: #4a4a4a
    }
.snes-outer-border {
    border: 8px solid #111;
    box-shadow: inset 0 0 0 4px #333
    }
.stadium-bg {
    background-color: var(--snes-dark-green);
    background-image: linear-gradient(rgba(45, 90, 61, 0.8), rgba(26, 51, 34, 0.9)), url(https://lh3.googleusercontent.com/aida-public/AB6AXuAE3fXw5gu_imL9x_JWDMn8XmLk_KTpPobFas23xnca-9xoqVH7e4N5BOYd5y1WbxfCLN1UDc0LtaqXjHUu_eFs_dGDeeakSk1OPUt97Jsw2-5QkvGky5Jh2E4a_FvbngmQJPt1vJpBUh639iZxeMo12qn0HseaFroiXApQKQGl92XkDPmAofl5h3ZsTuRF_GZAd7l17KOZcVX9dhCgElVojVZ-6ZfecJaf56uODgpfBIOleLAUBUHO6w5FFkGf5UYA38UP37cyHuc);
    background-size: cover;
    background-position: center;
    position: relative;
    overflow: hidden
    }
/* Scanline Effect */
.stadium-bg::after {
    content: " ";
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    bottom: 0;
    right: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
    z-index: 20;
    background-size: 100% 4px, 6px 100%;
    pointer-events: none
    }
/* Beveled Button Styling based on Screenshot UI */
.snes-btn {
    position: relative;
    width: 320px;
    padding: 16px;
    text-transform: uppercase;
    font-size: 14px;
    transition: transform 0.1s;
    border: 4px solid #000;
    box-shadow: inset 4px 4px 0 rgba(255, 255, 255, 0.4), inset -4px -4px 0 rgba(0, 0, 0, 0.4);
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 12px
    }
.snes-btn:active {
    transform: scale(0.98);
    box-shadow: inset -4px -4px 0 rgba(255, 255, 255, 0.4), inset 4px 4px 0 rgba(0, 0, 0, 0.4)
    }
.btn-yellow {
    background-color: var(--snes-yellow);
    color: #000
    }
.btn-green {
    background-color: var(--snes-green);
    color: #fff
    }
.btn-blue {
    background-color: var(--snes-blue);
    color: #fff
    }
.btn-gray {
    background-color: var(--snes-gray);
    color: #000
    }
.pixel-title {
    font-size: 64px;
    color: #fff;
    text-shadow: 6px 6px 0 #000;
    letter-spacing: 4px
    }
.pixel-subtitle {
    font-size: 14px;
    color: var(--snes-yellow);
    text-shadow: 2px 2px 0 #000
    }
/* Mascot Animation */
@keyframes fly {
    0% {
        transform: translate(0, 0) rotate(0deg);
        } 25% {
        transform: translate(20px, -10px) rotate(90deg);
        } 50% {
        transform: translate(0, -20px) rotate(180deg);
        } 75% {
        transform: translate(-20px, -10px) rotate(270deg);
        } 100% {
        transform: translate(0, 0) rotate(360deg);
        }
    }
.mascot {
    animation: fly 4s infinite linear
    }</style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
<!-- BEGIN: Main Screen Container -->
<main class="relative w-full max-w-5xl aspect-[4/3] snes-outer-border bg-black flex flex-col items-center justify-between p-12 stadium-bg" data-purpose="title-screen-wrapper">
<!-- BEGIN: Header Section -->
<header class="text-center z-10" data-purpose="title-header">
<div class="relative inline-block">
<!-- Mascot Ball -->
<div class="absolute -top-12 -right-16 mascot" data-purpose="mascot">
<svg fill="none" height="48" viewbox="0 0 24 24" width="48" xmlns="http://www.w3.org/2000/svg">
<rect fill="transparent" height="24" width="24"></rect>
<rect fill="white" height="16" width="16" x="4" y="4"></rect>
<rect fill="black" height="4" width="4" x="8" y="8"></rect>
<rect fill="black" height="4" width="4" x="12" y="12"></rect>
<rect fill="black" height="2" width="2" x="4" y="4"></rect>
<rect fill="black" height="2" width="2" x="18" y="4"></rect>
<rect fill="black" height="2" width="2" x="4" y="18"></rect>
<rect fill="black" height="2" width="2" x="18" y="18"></rect>
<!-- Trail -->
<rect fill="rgba(255,255,255,0.3)" height="2" width="8" x="-10" y="10"></rect>
</svg>
</div>
<h1 class="pixel-title italic">ELIFOOT</h1>
<p class="pixel-subtitle mt-4">Soccer Brasileiro Manager</p>
</div>
</header>
<!-- END: Header Section -->
<!-- BEGIN: Menu Options -->
<nav class="flex flex-col items-center justify-center z-10" data-purpose="main-menu">
<button class="snes-btn btn-yellow" id="btn-new-game">
        NOVO JOGO
      </button>
<button class="snes-btn btn-green" id="btn-load-game">
        CARREGAR SAVE
      </button>
<button class="snes-btn btn-blue" id="btn-player-mode">
        MODO JOGADOR
      </button>
<button class="snes-btn btn-gray" id="btn-options">
        OPCOES
      </button>
</nav>
<!-- END: Menu Options -->
<!-- BEGIN: Footer Info -->
<footer class="w-full flex justify-between items-end text-[10px] text-white/70 z-10" data-purpose="screen-footer">
<div class="p-2 border-t-2 border-l-2 border-white/20">
        v2.0.0 SNES
      </div>
<div class="p-2 border-t-2 border-r-2 border-white/20">
        by Dudu
      </div>
</footer>
<!-- END: Footer Info -->
<!-- Decorative Grass Texture Overlays -->
<div class="absolute inset-0 pointer-events-none opacity-10" data-purpose="texture-overlay" style="background-image: radial-gradient(#fff 1px, transparent 1px); background-size: 4px 4px;"></div>
</main>
<!-- END: Main Screen Container -->
<!-- BEGIN: Audio/Interaction logic -->
<script data-purpose="interaction-handlers">
    document.querySelectorAll('.snes-btn').forEach(button => {
      button.addEventListener('mouseenter', () => {
        // Implied sound effect logic would go here
        console.log('Select hovering');
      });
      
      button.addEventListener('click', () => {
        // Implied confirmation sound
        console.log('Action triggered: ' + button.innerText);
      });
    });
  </script>
<!-- END: Audio/Interaction logic -->
</body></html>
