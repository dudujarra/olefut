name: Regression Tests (Series)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "bug/**"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  regression-series:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Tests in series (1 file at a time)
        run: |
          set +e
          mkdir -p tests/regression
          PASSED=0
          FAILED=0
          FAILED_FILES=""
          # SPEC-157: deep-soak files rodam em suite separada (test:soak), pulados aqui.
          for f in $(find tests -name "*.test.js" | grep -v "deep-soak-" | sort); do
            echo "::group::$f"
            if npx vitest run "$f" --reporter=dot; then
              PASSED=$((PASSED + 1))
              echo "✅ $f"
            else
              FAILED=$((FAILED + 1))
              FAILED_FILES="$FAILED_FILES\n  - $f"
              echo "❌ $f"
            fi
            echo "::endgroup::"
          done
          echo "━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Passed: $PASSED"
          echo "Failed: $FAILED"
          if [ $FAILED -gt 0 ]; then
            echo -e "Failures:$FAILED_FILES"
            exit 1
          fi

      - name: Regression suite (only)
        if: always()
        run: npm run test:regression

      - name: Lint
        if: always()
        run: npm run lint

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            let body = '## 🐛 Bug Workflow Regression\n\n';
            try {
              const out = execSync('npm run test:specs 2>&1 || true').toString();
              body += '```\n' + out.split('\n').slice(-30).join('\n') + '\n```';
            } catch (e) {
              body += 'Error running tests';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
