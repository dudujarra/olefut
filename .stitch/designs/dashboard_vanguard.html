<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;family=Pixelify+Sans:wght@400;700&amp;family=IBM+Plex+Mono:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-container": "#39ff14",
                    "on-secondary": "#3a3000",
                    "secondary-fixed": "#ffe16d",
                    "error-container": "#93000a",
                    "on-error-container": "#ffdad6",
                    "tertiary-fixed": "#92f7c3",
                    "primary": "#efffe3",
                    "secondary-fixed-dim": "#e9c400",
                    "on-background": "#e1e2e7",
                    "secondary": "#fff9ef",
                    "surface-container-high": "#272a2d",
                    "inverse-on-surface": "#2e3134",
                    "tertiary": "#e9ffef",
                    "surface-container-low": "#191c1f",
                    "smoke": "#a0baae",
                    "forest-dark": "#0E1F14",
                    "on-secondary-fixed": "#221b00",
                    "on-primary": "#053900",
                    "primary-fixed": "#79ff5b",
                    "surface-container-highest": "#323538",
                    "surface-container-lowest": "#0b0e11",
                    "danger-red": "#FF3333",
                    "on-tertiary-fixed-variant": "#005235",
                    "tertiary-container": "#8cf1be",
                    "parchment": "#F1FAEE",
                    "surface-tint": "#2ae500",
                    "on-primary-fixed-variant": "#095300",
                    "abyss": "#040805",
                    "on-secondary-container": "#725f00",
                    "inverse-surface": "#e1e2e7",
                    "on-error": "#690005",
                    "on-tertiary": "#003823",
                    "on-secondary-fixed-variant": "#544600",
                    "surface-bright": "#37393d",
                    "on-tertiary-fixed": "#002113",
                    "secondary-container": "#ffdb3c",
                    "on-primary-container": "#107100",
                    "outline-variant": "#3c4b35",
                    "on-primary-fixed": "#022100",
                    "surface-variant": "#323538",
                    "outline": "#85967c",
                    "surface-container": "#1d2023",
                    "trophy-gold": "#FFD700",
                    "on-surface-variant": "#baccb0",
                    "tertiary-fixed-dim": "#75daa8",
                    "surface": "#111417",
                    "inverse-primary": "#106e00",
                    "on-surface": "#e1e2e7",
                    "pitch-green": "#52B788",
                    "surface-dim": "#111417",
                    "primary-fixed-dim": "#2ae500",
                    "on-tertiary-container": "#006f4a",
                    "error": "#ffb4ab",
                    "background": "#111417"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "lg": "24px",
                    "margin-mobile": "16px",
                    "xs": "4px",
                    "margin-desktop": "32px",
                    "gutter": "16px",
                    "md": "16px",
                    "xl": "48px",
                    "sm": "8px",
                    "base": "4px"
            },
            "fontFamily": {
                    "body-sm": ["Pixelify Sans"],
                    "body-lg": ["Pixelify Sans"],
                    "display-lg": ["'Press Start 2P'"],
                    "headline-md": ["'Press Start 2P'"],
                    "data-mono": ["'IBM Plex Mono'"],
                    "label-caps": ["'IBM Plex Mono'"]
            },
            "fontSize": {
                    "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "display-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "400"}],
                    "headline-md": ["20px", {"lineHeight": "1.4", "fontWeight": "400"}],
                    "data-mono": ["16px", {"lineHeight": "1.2", "fontWeight": "500"}],
                    "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700"}]
            }
          },
        },
      }

<style>
        .pixel-bevel {
            box-shadow: 
                inset 2px 2px 0px 0px #2D6A4F,
                inset -2px -2px 0px 0px #040805,
                4px 4px 0px 0px rgba(4, 8, 5, 1);
        }
        .pixel-bevel-inset {
            box-shadow: 
                inset -2px -2px 0px 0px #2D6A4F,
                inset 2px 2px 0px 0px #040805;
        }
        .scanline {
            background: linear-gradient(
                to bottom,
                rgba(18, 16, 16, 0) 50%,
                rgba(0, 0, 0, 0.25) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
        }
        .glow-primary {
            filter: drop-shadow(0 0 8px rgba(57, 255, 20, 0.6));
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-abyss text-parchment font-body-sm selection:bg-primary-container selection:text-abyss">
<!-- Top Navigation (Shell Implementation) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile py-2 bg-abyss border-b-2 border-primary-container shadow-[4px_4px_0px_0px_rgba(4,8,5,1)]">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">sports_soccer</span>
<h1 class="font-headline-md text-headline-md-mobile text-primary-container drop-shadow-[0_0_8px_rgba(57,255,20,0.6)]">OLÉFUT</h1>
</div>
<button class="flex items-center justify-center p-1 text-primary-container active:translate-y-0.5 transition-transform">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<main class="pt-16 pb-24 px-4 min-h-screen space-y-6">
<!-- 1. Match Scoreboard: Asymmetrical Double-Bezel Header -->
<section class="relative">
<div class="bg-forest-dark pixel-bevel border-2 border-outline-variant p-4">
<div class="flex justify-between items-end mb-2">
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-on-surface-variant mb-1">HOME</span>
<h2 class="font-headline-md text-headline-md-mobile">UNITED FC</h2>
</div>
<div class="flex flex-col items-end">
<span class="font-label-caps text-label-caps text-on-surface-variant mb-1">AWAY</span>
<h2 class="font-headline-md text-headline-md-mobile text-right">FLAMENGO</h2>
</div>
</div>
<div class="flex items-center justify-center gap-6 py-2 bg-abyss pixel-bevel-inset relative overflow-hidden">
<div class="scanline absolute inset-0 opacity-20"></div>
<span class="font-display-lg text-display-lg text-primary-container glow-primary">2</span>
<div class="flex flex-col items-center">
<div class="px-2 py-1 bg-primary-container/10 border border-primary-container mb-1">
<span class="font-data-mono text-primary-container animate-pulse">74'</span>
</div>
<span class="font-label-caps text-label-caps text-smoke">LIVE</span>
</div>
<span class="font-display-lg text-display-lg text-primary-container glow-primary">1</span>
</div>
</div>
</section>
<div class="grid grid-cols-1 md:grid-cols-3 gap-gutter">
<!-- 2. Tactical Pitch: Bento Central -->
<section class="md:col-span-2">
<div class="bg-forest-dark pixel-bevel border-2 border-outline-variant relative overflow-hidden h-[400px]">
<div class="absolute inset-0 p-4">
<div class="w-full h-full border-2 border-primary-container/30 relative flex items-center justify-center" style="background-color: #52B788;">
<!-- Pitch Markings -->
<div class="absolute inset-x-0 top-0 h-1/4 border-b-2 border-primary-container/30"></div>
<div class="absolute inset-x-0 bottom-0 h-1/4 border-t-2 border-primary-container/30"></div>
<div class="absolute h-full w-0 border-l-2 border-primary-container/30 left-1/2"></div>
<div class="absolute w-20 h-20 border-2 border-primary-container/30 rounded-full"></div>
<!-- Tactical Player Dots (Pixel Style) -->
<div class="absolute top-[10%] left-1/2 -translate-x-1/2 w-4 h-4 bg-abyss border-2 border-primary-container shadow-[2px_2px_0px_rgba(0,0,0,0.5)]"></div>
<div class="absolute top-[30%] left-[20%] w-4 h-4 bg-abyss border-2 border-primary-container shadow-[2px_2px_0px_rgba(0,0,0,0.5)]"></div>
<div class="absolute top-[30%] left-[80%] -translate-x-full w-4 h-4 bg-abyss border-2 border-primary-container shadow-[2px_2px_0px_rgba(0,0,0,0.5)]"></div>
<div class="absolute top-[60%] left-1/2 -translate-x-1/2 w-4 h-4 bg-primary-container border-2 border-abyss shadow-[2px_2px_0px_rgba(0,0,0,0.5)]"></div>
<div class="absolute bottom-[20%] left-[30%] w-4 h-4 bg-primary-container border-2 border-abyss shadow-[2px_2px_0px_rgba(0,0,0,0.5)]"></div>
<div class="absolute bottom-[20%] left-[70%] -translate-x-full w-4 h-4 bg-primary-container border-2 border-abyss shadow-[2px_2px_0px_rgba(0,0,0,0.5)]"></div>
</div>
</div>
<div class="absolute top-6 left-6 px-3 py-1 bg-abyss/80 backdrop-blur-sm border-2 border-outline-variant font-label-caps text-label-caps">
                        MINIMALIST FIELD v1.0
                    </div>
</div>
</section>
<!-- 3. Event Stream: Vertical Bento Box -->
<section class="md:col-span-1">
<div class="bg-forest-dark pixel-bevel border-2 border-outline-variant h-full">
<div class="bg-surface-container-high px-4 py-2 border-b-2 border-outline-variant">
<h3 class="font-label-caps text-label-caps text-primary-container">MATCH LOG</h3>
</div>
<div class="p-4 space-y-4 max-h-[340px] overflow-y-auto">
<!-- Goal Event -->
<div class="flex items-center gap-4 p-2 bg-abyss/50 border-b border-forest-dark relative overflow-hidden group hover:bg-forest-dark transition-colors">
<div class="scanline absolute inset-0 opacity-5"></div>
<div class="p-2 bg-trophy-gold/20 border border-trophy-gold">
<span class="material-symbols-outlined text-trophy-gold" style="font-variation-settings: 'FILL' 1;">trophy</span>
</div>
<div class="flex flex-col">
<span class="font-data-mono text-sm text-parchment">GOAL! S. ARAÚJO</span>
<span class="font-label-caps text-[10px] text-smoke">68' - UNITED FC</span>
</div>
</div>
<!-- Red Card Event -->
<div class="flex items-center gap-4 p-2 bg-abyss/50 border-b border-forest-dark relative overflow-hidden">
<div class="p-2 bg-danger-red/20 border border-danger-red">
<div class="w-4 h-6 bg-danger-red shadow-[0_0_8px_rgba(255,51,51,0.5)]"></div>
</div>
<div class="flex flex-col">
<span class="font-data-mono text-sm text-parchment">RED CARD: GABRIEL</span>
<span class="font-label-caps text-[10px] text-smoke">42' - FLAMENGO</span>
</div>
</div>
<!-- Yellow Card Event -->
<div class="flex items-center gap-4 p-2 bg-abyss/50 border-b border-forest-dark relative overflow-hidden">
<div class="p-2 bg-secondary-container/20 border border-secondary-container">
<div class="w-4 h-6 bg-secondary-container shadow-[0_0_8px_rgba(255,219,60,0.5)]"></div>
</div>
<div class="flex flex-col">
<span class="font-data-mono text-sm text-parchment">YELLOW: RODINEI</span>
<span class="font-label-caps text-[10px] text-smoke">15' - FLAMENGO</span>
</div>
</div>
</div>
</div>
</section>
</div>
<!-- 4. Action Controls: Bottom Bento Section -->
<section class="grid grid-cols-3 gap-4">
<button class="bg-forest-dark border-2 border-outline-variant p-4 flex flex-col items-center justify-center gap-2 pixel-bevel hover:bg-primary-container group transition-all active:translate-y-1 active:shadow-none">
<span class="material-symbols-outlined text-primary-container group-hover:text-abyss" style="font-variation-settings: 'FILL' 1;">swap_horizontal_circle</span>
<span class="font-label-caps text-[10px] group-hover:text-abyss">SUBSTITUIR</span>
</button>
<button class="bg-forest-dark border-2 border-outline-variant p-4 flex flex-col items-center justify-center gap-2 pixel-bevel hover:bg-primary-container group transition-all active:translate-y-1 active:shadow-none">
<span class="material-symbols-outlined text-primary-container group-hover:text-abyss" style="font-variation-settings: 'FILL' 1;">strategy</span>
<span class="font-label-caps text-[10px] group-hover:text-abyss">TÁTICA</span>
</button>
<button class="bg-forest-dark border-2 border-outline-variant p-4 flex flex-col items-center justify-center gap-2 pixel-bevel hover:bg-danger-red group transition-all active:translate-y-1 active:shadow-none">
<span class="material-symbols-outlined text-danger-red group-hover:text-abyss" style="font-variation-settings: 'FILL' 1;">pause_circle</span>
<span class="font-label-caps text-[10px] group-hover:text-abyss">PAUSAR</span>
</button>
</section>
</main>
<!-- Bottom Navigation Shell Implementation -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 py-3 bg-abyss border-t-2 border-primary-container shadow-[0_-4px_0px_0px_rgba(4,8,5,1)]">
<div class="flex flex-col items-center justify-center text-smoke px-2 py-1">
<span class="material-symbols-outlined">strategy</span>
<span class="font-label-caps text-label-caps mt-1">TACTICS</span>
</div>
<div class="flex flex-col items-center justify-center text-smoke px-2 py-1">
<span class="material-symbols-outlined">swap_horizontal_circle</span>
<span class="font-label-caps text-label-caps mt-1">SUBSTITUTE</span>
</div>
<div class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-none border-2 border-on-primary shadow-[inset_2px_2px_0px_rgba(255,255,255,0.3)] px-2 py-1 scale-95">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">history_edu</span>
<span class="font-label-caps text-label-caps mt-1">LOG</span>
</div>
<div class="flex flex-col items-center justify-center text-smoke px-2 py-1">
<span class="material-symbols-outlined">summarize</span>
<span class="font-label-caps text-label-caps mt-1">RECAP</span>
</div>
</nav>
<!-- Decorative CRT Overlay -->
<div class="fixed inset-0 pointer-events-none z-[100] scanline opacity-10"></div>
<div class="fixed inset-0 pointer-events-none z-[101] shadow-[inset_0_0_100px_rgba(0,0,0,0.5)]"></div>
</body></html>
